[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# ⚠️ Never set via-ir to true, the Solidity 0.8.28 has the bug, Transient Storage Clearing Helper Collision Bug https://www.soliditylang.org/blog/2026/02/18/transient-storage-clearing-helper-collision-bug/.
# ⚠️ Historically there were multiple issue with via-ir compiler, so it is best to keep it disabled for future Solidity versions too. Reference for past bugs: https://www.soliditylang.org/blog/2022/09/08/storage-write-removal-before-conditional-termination https://www.soliditylang.org/blog/2023/07/19/full-inliner-non-expression-split-argument-evaluation-order-bug
via_ir = false
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "write", path = "./deploy/"}]

[profile.ci]

[rpc_endpoints]
mainnet = "${ETHEREUM_NODE_MAINNET}"
arbitrum = "${ETHEREUM_NODE_ARBITRUM}"
base = "${ETHEREUM_NODE_BASE}"
plume = "${ETHEREUM_NODE_PLUME}"
mega_eth = "${ETHEREUM_NODE_MEGA_ETH}"
ethereum_sepolia = "${ETHEREUM_NODE_ETHEREUM_SEPOLIA}"

[etherscan]
mainnet          = { key = "${ETHERSCAN_API_KEY}", chain = 1,        url = "https://api.etherscan.io/v2/api?chainid=1" }
arbitrum         = { key = "${ETHERSCAN_API_KEY}", chain = 42161,    url = "https://api.etherscan.io/v2/api?chainid=42161" }
base             = { key = "${ETHERSCAN_API_KEY}", chain = 8453,     url = "https://api.etherscan.io/v2/api?chainid=8453" }
ethereum_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111, url = "https://api.etherscan.io/v2/api?chainid=11155111" }

[lint]
# Several lints fail on acronyms like "ERC" instead of "Erc", so we exclude those
exclude_lints = [
    "pascal-case-struct",
    "mixed-case-function",
    "mixed-case-variable",
    "asm-keccak256",
    "unwrapped-modifier-logic"
]
ignore = [
    "src/interfaces/external/**/*.sol",
    "test/**/*.sol"
]

[fmt]
ignore = ["lib/**/*.sol"]
